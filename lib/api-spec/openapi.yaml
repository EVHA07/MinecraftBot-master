openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Minecraft bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bot/connect:
    post:
      operationId: connectBot
      tags: [bot]
      summary: Connect bot to a Minecraft server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectBotBody"
      responses:
        "200":
          description: Bot connection initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Bot already connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bot/disconnect:
    post:
      operationId: disconnectBot
      tags: [bot]
      summary: Disconnect bot from server
      responses:
        "200":
          description: Bot disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
        "400":
          description: Bot not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bot/chat:
    post:
      operationId: sendBotChat
      tags: [bot]
      summary: Send a chat message as the bot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatBody"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Bot not connected or invalid message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get current bot status
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"
  /bot/logs:
    get:
      operationId: getBotLogs
      tags: [bot]
      summary: Get recent bot log entries
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          required: false
          description: Max number of log entries to return (default 100)
      responses:
        "200":
          description: Log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ConnectBotBody:
      type: object
      properties:
        host:
          type: string
        port:
          type: integer
        username:
          type: string
        version:
          type: ["string", "null"]
      required:
        - host
        - port
        - username
    SendChatBody:
      type: object
      properties:
        message:
          type: string
      required:
        - message
    BotStatus:
      type: object
      properties:
        connected:
          type: boolean
        username:
          type: ["string", "null"]
        host:
          type: ["string", "null"]
        port:
          type: ["integer", "null"]
        health:
          type: ["number", "null"]
        food:
          type: ["number", "null"]
        position:
          oneOf:
            - $ref: "#/components/schemas/Position"
            - type: "null"
        gameMode:
          type: ["string", "null"]
        version:
          type: ["string", "null"]
      required:
        - connected
        - username
        - host
        - port
        - health
        - food
        - gameMode
        - version
    Position:
      type: object
      properties:
        x:
          type: number
        y:
          type: number
        z:
          type: number
      required:
        - x
        - y
        - z
    LogEntry:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
        type:
          type: string
        message:
          type: string
      required:
        - id
        - timestamp
        - type
        - message
    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
